services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: arc
      POSTGRES_PASSWORD: arcpass
      POSTGRES_DB: arcpassport
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://arc:arcpass@db:5432/arcpassport
      CIRCLE_BASE_URL: https://api-sandbox.circle.com

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
