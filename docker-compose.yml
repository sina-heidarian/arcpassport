services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: arc
      POSTGRES_PASSWORD: arcpass
      POSTGRES_DB: arcpassport
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://arc:arcpass@db:5432/arcpassport

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend