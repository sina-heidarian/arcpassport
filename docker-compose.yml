services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: arc
      POSTGRES_PASSWORD: arcpass
      POSTGRES_DB: arcpassport
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arc -d arcpassport"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://arc:arcpass@db:5432/arcpassport
      CIRCLE_BASE_URL: https://api.circle.com
      CIRCLE_API_KEY: ${CIRCLE_API_KEY:-}
      CIRCLE_DEBUG: ${CIRCLE_DEBUG:-false}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
